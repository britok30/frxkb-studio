name: Sync Inngest after deploy

# Every push to main triggers a Vercel deploy; Inngest cloud does NOT pick up
# new/changed functions until the app re-registers, and un-synced events are
# silently dropped ("no functions triggered") — this bit prod three times in
# one week. Until the official Inngest × Vercel integration is installed
# (which does this properly on deployment.succeeded), this workflow waits out
# the typical build window and re-registers, retrying across the rollout.

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel rollout, then register with Inngest
        run: |
          sleep 180
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/out -w "%{http_code}" -X PUT https://www.frxkbstudio.com/api/inngest)
            echo "attempt $i → HTTP $code: $(cat /tmp/out | head -c 200)"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 60
          done
          echo "Inngest registration failed after retries" >&2
          exit 1
